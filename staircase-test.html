<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8"/>
  <title>JUZ40 — Staircase Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #0a0a0a;
      --text:          #ffffff;
      --text-dim:      rgba(255,255,255,.55);
      --text-mute:     rgba(255,255,255,.32);
      --frame:         rgba(255,255,255,.35);
      --inactive-text: rgba(255,255,255,.35);
      --inactive-line: rgba(244,216,79,.4);
      --done-line:     rgba(244,216,79,.6);
      --accent:        #f4d84f;
      --vert:          rgba(255,255,255,.25);

      /* === Tweakable geometry (synced with sliders below) === */
      --step-indent:  46px;
      --step-rise:    52px;
      --step-h:       36px;
      --line-len:     320px;
      --vert-w:       3px;
      --line-h:       4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 60px;
      gap: 40px;
    }

    /* ── STAIRCASE ──────────────────────────────────────────────── */
    .timeline {
      position: relative;
      width: fit-content;
      padding: 0 0 0 8px;
    }

    /* Top L-frame: title + horizontal rule + counter */
    .timeline-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 18px;
      padding-bottom: 26px;
      min-width: 700px;
    }
    .timeline-label {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: .35em;
      color: var(--text);
      text-transform: uppercase;
    }
    .timeline-header-line {
      height: 2px;
      background: var(--frame);
    }
    .timeline-count {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    .timeline-count .current { color: var(--accent); }
    .timeline-count .sep,
    .timeline-count .total   { color: var(--inactive-text); }

    /* Left vertical drop closing the L-frame */
    .timeline-frame-vert {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--frame);
    }

    /* The staircase itself */
    .timeline-stages {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: calc(var(--step-rise) - var(--step-h));
    }

    .timeline-stage {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      height: var(--step-h);
      margin-left: calc(var(--step-idx, 0) * var(--step-indent));
    }

    /* Each step's vertical riser: lands flush on previous step's tread */
    .step-vertical {
      position: absolute;
      left: -2px;
      bottom: 50%;
      width: var(--vert-w);
      height: var(--step-rise);
      background: var(--vert);
      transition: background .35s ease;
    }
    .timeline-stage:first-child .step-vertical {
      /* First step's riser reaches up to the L-frame's horizontal line */
      height: 40px;
    }

    .step-num {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--inactive-text);
      min-width: 36px;
      margin-left: 14px;
      transition: color .35s ease;
    }
    .step-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--inactive-text);
      white-space: nowrap;
      transition: color .35s ease;
    }

    .step-line {
      width: var(--line-len);
      height: var(--line-h);
      background: var(--inactive-line);
      transition: background .35s ease, box-shadow .35s ease;
      flex-shrink: 0;
    }

    /* ── States ──────────────────────────────────────────────── */
    .timeline-stage.is-active .step-num,
    .timeline-stage.is-active .step-label { color: var(--text); }
    .timeline-stage.is-active .step-vertical { background: var(--text); }
    .timeline-stage.is-active .step-line {
      background: var(--accent);
      box-shadow: 0 0 16px rgba(244,216,79,.6), 0 0 32px rgba(244,216,79,.3);
    }

    .timeline-stage.is-done .step-line { background: var(--done-line); }

    /* ── CONTROL PANEL (for quick iteration) ──────────────────── */
    .controls {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 280px;
      background: rgba(20,20,20,.95);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      padding: 18px;
      font-size: 12px;
      backdrop-filter: blur(10px);
    }
    .controls h3 {
      font-size: 11px;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .control-row label {
      flex: 0 0 110px;
      color: var(--text-dim);
      font-weight: 600;
    }
    .control-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }
    .control-row .val {
      width: 50px;
      text-align: right;
      color: var(--accent);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .control-row.buttons { gap: 4px; }
    .control-row.buttons button {
      flex: 1;
      padding: 6px 0;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      color: var(--text);
      font-family: inherit;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .control-row.buttons button:hover { background: rgba(244,216,79,.2); }
    .control-row.buttons button.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <!-- ─── STAIRCASE ─────────────────────────────────────────── -->
  <div class="timeline" aria-label="Этап барысы">
    <div class="timeline-header">
      <span class="timeline-label">ПРОЦЕСС</span>
      <div class="timeline-header-line"></div>
      <span class="timeline-count">
        <span class="current" id="counter">1</span><span class="sep"> / </span><span class="total">5</span>
      </span>
    </div>
    <div class="timeline-frame-vert"></div>

    <ol class="timeline-stages" id="stages">
      <li class="timeline-stage is-active" style="--step-idx: 0;">
        <span class="step-vertical"></span>
        <span class="step-num">01</span>
        <span class="step-label">Топтар жүктелуде</span>
        <span class="step-line"></span>
      </li>
      <li class="timeline-stage" style="--step-idx: 1;">
        <span class="step-vertical"></span>
        <span class="step-num">02</span>
        <span class="step-label">Сабақтар талдануда</span>
        <span class="step-line"></span>
      </li>
      <li class="timeline-stage" style="--step-idx: 2;">
        <span class="step-vertical"></span>
        <span class="step-num">03</span>
        <span class="step-label">Ортақ балл есептелуде</span>
        <span class="step-line"></span>
      </li>
      <li class="timeline-stage" style="--step-idx: 3;">
        <span class="step-vertical"></span>
        <span class="step-num">04</span>
        <span class="step-label">Кесте құрастырылуда</span>
        <span class="step-line"></span>
      </li>
      <li class="timeline-stage" style="--step-idx: 4;">
        <span class="step-vertical"></span>
        <span class="step-num">05</span>
        <span class="step-label">Қорытынды дайындалуда</span>
        <span class="step-line"></span>
      </li>
    </ol>
  </div>

  <!-- ─── CONTROL PANEL ─────────────────────────────────────── -->
  <div class="controls">
    <h3>Настройки лесенки</h3>

    <div class="control-row">
      <label>Шаг ⇢</label>
      <input type="range" id="r-indent" min="0" max="120" value="46">
      <span class="val" id="v-indent">46px</span>
    </div>
    <div class="control-row">
      <label>Шаг ⇣</label>
      <input type="range" id="r-rise" min="30" max="120" value="52">
      <span class="val" id="v-rise">52px</span>
    </div>
    <div class="control-row">
      <label>Высота строки</label>
      <input type="range" id="r-h" min="20" max="80" value="36">
      <span class="val" id="v-h">36px</span>
    </div>
    <div class="control-row">
      <label>Длина линии</label>
      <input type="range" id="r-line" min="100" max="600" value="320">
      <span class="val" id="v-line">320px</span>
    </div>
    <div class="control-row">
      <label>Толщ. линии</label>
      <input type="range" id="r-lineh" min="1" max="8" value="4">
      <span class="val" id="v-lineh">4px</span>
    </div>
    <div class="control-row">
      <label>Толщ. верт.</label>
      <input type="range" id="r-vertw" min="1" max="6" value="3">
      <span class="val" id="v-vertw">3px</span>
    </div>

    <h3 style="margin-top: 16px;">Активный этап</h3>
    <div class="control-row buttons">
      <button data-idx="0" class="active">01</button>
      <button data-idx="1">02</button>
      <button data-idx="2">03</button>
      <button data-idx="3">04</button>
      <button data-idx="4">05</button>
    </div>
  </div>

  <script>
    // Live-tweak CSS variables from sliders
    const root = document.documentElement;
    const sliders = [
      { id: 'r-indent', cssVar: '--step-indent', valId: 'v-indent', suffix: 'px' },
      { id: 'r-rise',   cssVar: '--step-rise',   valId: 'v-rise',   suffix: 'px' },
      { id: 'r-h',      cssVar: '--step-h',      valId: 'v-h',      suffix: 'px' },
      { id: 'r-line',   cssVar: '--line-len',    valId: 'v-line',   suffix: 'px' },
      { id: 'r-lineh',  cssVar: '--line-h',      valId: 'v-lineh',  suffix: 'px' },
      { id: 'r-vertw',  cssVar: '--vert-w',      valId: 'v-vertw',  suffix: 'px' },
    ];
    sliders.forEach(s => {
      const el = document.getElementById(s.id);
      const valEl = document.getElementById(s.valId);
      el.addEventListener('input', () => {
        const v = el.value + s.suffix;
        root.style.setProperty(s.cssVar, v);
        valEl.textContent = v;
      });
    });

    // Active stage buttons
    const stages = document.querySelectorAll('#stages .timeline-stage');
    const counter = document.getElementById('counter');
    document.querySelectorAll('.controls button[data-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.idx;
        document.querySelectorAll('.controls button[data-idx]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        stages.forEach((li, i) => {
          li.classList.remove('is-active', 'is-done');
          if (i < idx)        li.classList.add('is-done');
          else if (i === idx) li.classList.add('is-active');
        });
        counter.textContent = idx + 1;
      });
    });
  </script>
</body>
</html>
