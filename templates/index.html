<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JUZ40 Supervisor — Кіру</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-logo">
      <div class="logo-circle">J40</div>
      <h1>JUZ40 Supervisor</h1>
      <p class="login-subtitle">Супервайзер панелі</p>
    </div>

    {% if error %}
    <div class="alert alert-error">
      <span class="alert-icon">⚠</span> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="form-group">
        <label for="username">Логин / Email</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Логинді енгізіңіз"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Парольді енгізіңіз"
          required
          autocomplete="current-password"
        />
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Кіру →
      </button>
    </form>
  </div>
</body>
</html>
