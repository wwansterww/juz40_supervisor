<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JUZ40 — Жүктелуде…</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <style>
    .loading-card {
      max-width: 520px;
      margin: 80px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 40px 40px;
      text-align: center;
    }
    .loading-icon { font-size: 48px; margin-bottom: 16px; }
    .loading-title { font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .loading-sub   { font-size: 14px; color: #666; margin-bottom: 32px; }

    .progress-wrap {
      background: #f0f4ff;
      border-radius: 99px;
      height: 14px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #1A73E8, #34a0f5);
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
    }
    .progress-text {
      font-size: 13px;
      color: #555;
      margin-bottom: 28px;
    }
    .status-dots span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #1A73E8;
      border-radius: 50%;
      margin: 0 3px;
      animation: blink 1.2s infinite;
    }
    .status-dots span:nth-child(2) { animation-delay: .2s; }
    .status-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    .error-msg {
      background: #ffebee; color: #c62828;
      border-radius: 8px; padding: 14px 18px;
      font-size: 14px; margin-top: 16px; display: none;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-sm">J40</div>
      <span>JUZ40 Supervisor</span>
    </div>
    <a href="/logout" class="btn btn-ghost">Шығу</a>
  </nav>

  <div class="page-container">
    <div class="loading-card">
      <div class="loading-icon">📊</div>
      <div class="loading-title">Отчет жасалуда…</div>
      <div class="loading-sub" id="course-label">{{ course_name }} · {{ study_month }}</div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">
        <span class="status-dots"><span></span><span></span><span></span></span>
        &nbsp; Топтар жүктелуде…
      </div>

      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <!-- Hidden form to start the job -->
  <form id="start-form" method="post" action="{{ subject_prefix | default('') }}/report/start" style="display:none">
    <input type="hidden" name="course_id"    value="{{ course_id }}"/>
    <input type="hidden" name="course_name"  value="{{ course_name }}"/>
    <input type="hidden" name="study_month"  value="{{ study_month }}"/>
  </form>

  <script>
    const subjectPrefix = "{{ subject_prefix | default('') }}";
    let jobId = null;
    let pollTimer = null;

    // Step 1: submit the start form via fetch to get job_id
    async function startJob() {
      const form = document.getElementById('start-form');
      const data = new FormData(form);
      try {
        const resp = await fetch(`${subjectPrefix}/report/start`, { method: 'POST', body: data });
        const json = await resp.json();
        if (json.error) { showError(json.error); return; }
        jobId = json.job_id;
        pollProgress(json.total);
      } catch(e) {
        showError('Сервермен байланыс үзілді. Бетті жаңартып көріңіз.');
      }
    }

    // Step 2: poll progress every 1.5s
    function pollProgress(total) {
      pollTimer = setInterval(async () => {
        try {
          const resp = await fetch(`${subjectPrefix}/report/progress/${jobId}`);
          const json = await resp.json();
          const pct = total > 0 ? Math.round((json.done / total) * 100) : 0;

          document.getElementById('progress-bar').style.width = pct + '%';
          document.getElementById('progress-text').innerHTML =
            `${json.done} / ${total} топ өңделді &nbsp;(${pct}%)`;

          if (json.status === 'done') {
            clearInterval(pollTimer);
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-text').textContent = '✅ Дайын! Бетке өтіп жатырмыз…';
            setTimeout(() => { window.location.href = `${subjectPrefix}/report/result`; }, 600);
          }
        } catch(e) {
          // silently retry
        }
      }, 1500);
    }

    function showError(msg) {
      if (pollTimer) clearInterval(pollTimer);
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('progress-text').textContent = '';
    }

    // Kick off on page load
    window.addEventListener('DOMContentLoaded', startJob);
  </script>
</body>
</html>
