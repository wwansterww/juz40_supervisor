<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JUZ40 — Жүктелуде…</title>
  <link rel="stylesheet" href="/static/style.css?v=5"/>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo-sm">J40</div>
      <span>JUZ40 Supervisor</span>
    </div>
    <a href="/logout" class="btn btn-ghost">Шығу</a>
  </nav>

  <div class="page-container">
    <div class="loading-card">
      <div class="loading-icon">📊</div>
      <div class="loading-title">Отчет жасалуда…</div>
      <div class="loading-sub" id="course-label">{{ course_name }} · {{ study_month }}</div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">
        <span class="status-dots"><span></span><span></span><span></span></span>
        &nbsp; Топтар жүктелуде…
      </div>

      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <form id="start-form" method="post" action="{{ subject_prefix | default('') }}/report/start" style="display:none">
    <input type="hidden" name="course_id"    value="{{ course_id }}"/>
    <input type="hidden" name="course_name"  value="{{ course_name }}"/>
    <input type="hidden" name="study_month"  value="{{ study_month }}"/>
  </form>

  <script>
    const subjectPrefix = "{{ subject_prefix | default('') }}";
    let jobId = null;
    let pollTimer = null;
    let errorStreak = 0;
    const POLL_INTERVAL = 600;
    const MAX_ERRORS    = 5;

    async function startJob() {
      const form = document.getElementById('start-form');
      const data = new FormData(form);
      try {
        const resp = await fetch(`${subjectPrefix}/report/start`, { method: 'POST', body: data });
        const json = await resp.json();
        if (json.error) { showError(json.error); return; }
        jobId = json.job_id;
        schedulePoll();
      } catch(e) {
        showError('Сервермен байланыс үзілді. Бетті жаңартып көріңіз.');
      }
    }

    function schedulePoll() {
      poll();
      pollTimer = setInterval(poll, POLL_INTERVAL);
    }

    async function poll() {
      try {
        const resp = await fetch(`${subjectPrefix}/report/progress/${jobId}`);
        if (!resp.ok) throw new Error(resp.status);
        const json = await resp.json();
        errorStreak = 0;

        const total = json.total || 0;
        const done  = json.done  || 0;
        const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-text').innerHTML =
          `${done} / ${total} топ өңделді &nbsp;(${pct}%)`;

        if (json.status === 'done') {
          clearInterval(pollTimer);
          document.getElementById('progress-bar').style.width = '100%';
          document.getElementById('progress-text').textContent = '✅ Дайын! Бетке өтіп жатырмыз…';
          setTimeout(() => { window.location.href = `${subjectPrefix}/report/result`; }, 400);
        }
      } catch(e) {
        errorStreak++;
        if (errorStreak >= MAX_ERRORS) {
          showError('Сервермен байланыс үзілді. Бетті жаңартып көріңіз.');
        }
      }
    }

    function showError(msg) {
      if (pollTimer) clearInterval(pollTimer);
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('progress-text').textContent = '';
    }

    window.addEventListener('DOMContentLoaded', startJob);
  </script>
</body>
</html>
